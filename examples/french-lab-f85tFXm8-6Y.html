<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地道法语表达实验室 — 法国人眼中的「人生成功」</title>
<style>
  :root {
    --bg: #FFFFFF;
    --surface: #EAECF0;
    --card: #FFFFFF;
    --border: #EAECF0;
    --border-hover: #FE7F2D;
    --border-active: #FE7F2D;
    --accent: #FE7F2D;
    --accent-light: rgba(254, 127, 45, 0.08);
    --text: #000000;
    --text-secondary: #233D4D;
    --text-tertiary: #6B7D8A;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 16px;
    --font: "Inter", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .header {
    height: 44px;
    display: flex;
    align-items: center;
    padding: 0 24px;
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  /* Main layout */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Grammar List — fixed compact */
  .grammar-list {
    flex: 0 1 300px;
    min-width: 220px;
    border-right: 0.5px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .grammar-list-header {
    padding: 20px 24px 12px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }

  .grammar-section-header {
    padding: 16px 24px 10px;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    flex-shrink: 0;
    border-top: 1.5px solid var(--accent);
    margin: 12px 16px 0;
    background: var(--accent-light);
    border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  }

  .grammar-list-items {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px 20px;
  }

  .grammar-list-items::-webkit-scrollbar {
    width: 4px;
  }
  .grammar-list-items::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 2px;
  }
  .grammar-list-items::-webkit-scrollbar-track {
    background: transparent;
  }

  /* Grammar List Item */
  .grammar-item {
    padding: 14px 16px;
    border-radius: var(--radius-md);
    cursor: pointer;
    position: relative;
    transition: all 0.18s ease-out;
    margin-bottom: 8px;
    border: 0.5px solid transparent;
    background: transparent;
  }

  .grammar-item:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .grammar-item.active {
    background: var(--card);
    border-color: var(--border-active);
  }
  .grammar-item.active::before {
    content: "";
    position: absolute;
    left: 2px;
    top: 16px;
    bottom: 16px;
    width: 3px;
    border-radius: 2px;
    background: var(--accent);
  }

  .grammar-item .name-row {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    margin-bottom: 4px;
    padding-right: 52px;
  }

  .grammar-item .name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    word-break: break-word;
    overflow-wrap: break-word;
    hyphens: auto;
    line-height: 1.35;
  }

  .grammar-item .cefr-badge {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-tertiary);
    background: var(--border);
    padding: 1px 6px;
    border-radius: 3px;
    letter-spacing: 0.02em;
    line-height: 1.4;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .grammar-item.active .cefr-badge {
    background: var(--accent-light);
    color: var(--accent);
  }

  .grammar-item .meaning {
    font-size: 12px;
    color: var(--text-secondary);
    word-break: break-word;
    overflow-wrap: break-word;
    padding-right: 52px;
  }

  .grammar-item .pill {
    display: inline-flex;
    align-items: center;
    height: 22px;
    padding: 0 10px;
    border-radius: 11px;
    background: var(--surface);
    font-size: 11px;
    color: var(--text-secondary);
    position: absolute;
    right: 16px;
    top: 16px;
    white-space: nowrap;
  }

  .grammar-item.active .pill {
    background: var(--accent-light);
    color: var(--accent);
  }

  .grammar-item:first-child .pill::after {
    content: " · TOP1";
  }

  /* ── Slang items — distinct visual style ── */
  #slangList .grammar-item {
    border-left: 3px solid transparent;
    border-radius: 0 var(--radius-md) var(--radius-md) 0;
    background: transparent;
  }
  #slangList .grammar-item:hover {
    background: rgba(254, 127, 45, 0.04);
  }
  #slangList .grammar-item.active {
    background: var(--card);
    border-color: var(--border-active);
    border-left-color: var(--accent);
    border-left-width: 3px;
  }
  #slangList .grammar-item.active::before {
    content: none; /* remove the inner bar — left-border serves this purpose */
  }
  #slangList .grammar-item .pill {
    background: rgba(254, 127, 45, 0.06);
    color: var(--accent);
    font-size: 10px;
    font-weight: 500;
  }
  #slangList .grammar-item.active .pill {
    background: var(--accent-light);
  }

  /* Learning Space — 65% */
  .learning-space {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 24px 32px 0;
  }

  .grammar-title-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 4px;
    flex-shrink: 0;
  }

  .grammar-title {
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .freq-pill {
    display: inline-flex;
    align-items: center;
    height: 24px;
    padding: 0 12px;
    border-radius: 12px;
    background: var(--accent-light);
    color: var(--accent);
    font-size: 12px;
    font-weight: 500;
  }

  .cefr-pill {
    display: inline-flex;
    align-items: center;
    height: 24px;
    padding: 0 10px;
    border-radius: 4px;
    background: var(--surface);
    color: var(--text-tertiary);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .divider {
    height: 0.5px;
    background: var(--border);
    margin: 16px 0;
    flex-shrink: 0;
  }

  .explanation {
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    background: var(--surface);
    padding: 16px 20px;
    border-radius: var(--radius-md);
    flex-shrink: 0;
  }

  /* Bottom area: examples + video */
  .content-area {
    display: flex;
    flex: 1;
    gap: 28px;
    overflow: hidden;
    margin-top: 4px;
  }

  .examples-col {
    flex: 0 0 40%;
    min-width: 280px;
    overflow-y: auto;
    padding-right: 8px;
  }
  .examples-col::-webkit-scrollbar {
    width: 4px;
  }
  .examples-col::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 2px;
  }
  .examples-col::-webkit-scrollbar-track {
    background: transparent;
  }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 12px;
  }

  .example-card {
    padding: 14px 16px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border);
    margin-bottom: 10px;
    transition: all 0.12s ease;
    cursor: pointer;
  }

  .example-card:hover {
    background: var(--accent-light);
  }

  .example-card.playing {
    background: var(--accent-light);
    border-color: var(--accent);
  }

  .example-card .fr {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }

  .example-card.playing .fr { color: var(--accent); }

  .example-card .zh {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 1px;
  }

  .example-card.playing .zh { color: var(--accent); }

  .timestamp {
    display: inline-block;
    font-size: 12px;
    color: var(--accent);
    margin-top: 6px;
    cursor: pointer;
    transition: color 0.12s;
  }
  .timestamp:hover {
    color: var(--text);
    text-decoration: underline;
  }
  .example-card.playing .timestamp {
    color: var(--accent);
  }

  /* Video column */
  .video-col {
    flex: 1;
    min-width: 320px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    overflow: hidden;
  }

  .video-wrapper {
    width: 100%;
    align-self: stretch;
    border-radius: var(--radius-md);
    overflow: hidden;
    background: #1a1a1a;
  }
  .video-wrapper iframe {
    display: block;
    width: 100%;
    aspect-ratio: 16/9;
    border: none;
  }

  /* Subtitle panel */
  .subtitle-panel {
    width: 100%;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    overflow-x: hidden;
    margin-top: 12px;
    padding-right: 4px;
    font-size: 12px;
    line-height: 1.6;
  }
  .subtitle-panel::-webkit-scrollbar {
    width: 4px;
  }
  .subtitle-panel::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 2px;
  }
  .subtitle-line {
    display: flex;
    flex-direction: column;
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s ease;
    border-left: 3px solid transparent;
  }
  .subtitle-line:hover {
    background: var(--surface);
  }
  .subtitle-line.active {
    background: var(--accent-light);
    border-left-color: var(--accent);
  }
  .subtitle-line .sub-fr {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }
  .subtitle-line .sub-zh {
    font-size: 11px;
    color: var(--text-secondary);
  }
  .subtitle-line .sub-time {
    font-size: 10px;
    color: var(--text-tertiary);
    margin-bottom: 2px;
    font-variant-numeric: tabular-nums;
  }

  /* Wordbook button — below subtitle panel */
  .wordbook-btn {
    display: block;
    width: 33%;
    align-self: flex-end;
    margin-top: 16px;
    margin-bottom: 8px;
    height: 38px;
    border-radius: var(--radius-sm);
    background: var(--accent);
    color: #fff;
    border: none;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    font-family: var(--font);
    transition: all 0.15s ease;
    letter-spacing: 0.02em;
    flex-shrink: 0;
  }
  .wordbook-btn:hover {
    filter: brightness(1.1);
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(254, 127, 45, 0.3);
  }

  /* Wordbook panel */
  .wordbook-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .wordbook-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  .wordbook-panel {
    position: fixed;
    top: 0;
    right: 0;
    width: 420px;
    height: 100vh;
    background: var(--bg);
    border-left: 0.5px solid var(--border);
    z-index: 201;
    transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    box-shadow: -4px 0 40px rgba(0,0,0,0.08);
  }
  .wordbook-panel.open {
    transform: translateX(0);
  }

  .wordbook-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
  }
  .wordbook-header h2 {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }
  .wordbook-close {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: var(--surface);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: var(--text-secondary);
    transition: background 0.12s;
  }
  .wordbook-close:hover { background: var(--border); }

  .wordbook-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
    overflow: hidden;
  }

  .wordbook-progress {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-bottom: 40px;
    text-align: center;
  }
  .wordbook-progress .bar-track {
    width: 160px;
    height: 3px;
    background: var(--surface);
    border-radius: 2px;
    margin: 8px auto 0;
    overflow: hidden;
  }
  .wordbook-progress .bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .flashcard {
    width: 100%;
    min-height: 200px;
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 40px 28px;
    text-align: center;
    cursor: pointer;
    transition: background 0.2s ease, border 0.2s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
    position: relative;
  }
  /* When switching cards, disable transitions to avoid brief flash of new answer */
  .flashcard.switching,
  .flashcard.switching .back,
  .flashcard.switching .example-hint,
  .flashcard.switching .front {
    transition: none !important;
  }
  .flashcard.revealed {
    background: var(--card);
    border: 0.5px solid var(--border);
  }
  .flashcard .front {
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
    transition: opacity 0.15s ease;
  }
  .flashcard.revealed .front {
    font-size: 16px;
    margin-bottom: 16px;
    color: var(--text-secondary);
  }
  .flashcard .back {
    font-size: 16px;
    color: var(--text);
    line-height: 1.5;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: all 0.2s ease;
  }
  .flashcard.revealed .back {
    opacity: 1;
    max-height: 120px;
  }
  .flashcard .example-hint {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-top: 20px;
    font-style: italic;
    opacity: 0;
    transition: opacity 0.2s ease 0.1s;
  }
  .flashcard.revealed .example-hint {
    opacity: 1;
  }
  .flashcard .tap-hint {
    font-size: 12px;
    color: var(--text-tertiary);
    position: absolute;
    bottom: 16px;
    opacity: 0.6;
  }
  .flashcard.revealed .tap-hint {
    display: none;
  }

  .wordbook-actions {
    display: flex;
    gap: 12px;
    margin-top: 32px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .flashcard.revealed ~ .wordbook-actions {
    opacity: 1;
    pointer-events: auto;
  }

  .wb-btn {
    height: 44px;
    padding: 0 24px;
    border-radius: 22px;
    border: none;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.12s ease;
    font-family: var(--font);
  }
  .wb-btn.know {
    background: var(--accent);
    color: #fff;
  }
  .wb-btn.know:hover { filter: brightness(1.08); }
  .wb-btn.review {
    background: var(--surface);
    color: var(--text-secondary);
  }
  .wb-btn.review:hover { background: var(--border); }

  .wordbook-empty {
    text-align: center;
    color: var(--text-tertiary);
    font-size: 13px;
    display: none;
  }
  .wordbook-empty.show { display: block; }
  .wordbook-empty .icon {
    font-size: 40px;
    margin-bottom: 16px;
    opacity: 0.5;
  }

  /* Wordbook Add Area — at panel bottom */
  .wordbook-add-area {
    flex-shrink: 0;
    border-top: 0.5px solid var(--border);
    padding: 16px 24px;
  }
  .wordbook-add-row {
    display: flex;
    gap: 8px;
  }
  .wordbook-add-input {
    flex: 1;
    min-width: 0;
    height: 36px;
    padding: 0 12px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: var(--font);
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s ease;
  }
  .wordbook-add-input::placeholder {
    color: var(--text-tertiary);
    font-size: 12px;
  }
  .wordbook-add-input:focus {
    border-color: var(--accent);
  }
  .wordbook-add-btn {
    height: 36px;
    padding: 0 16px;
    border-radius: var(--radius-sm);
    background: var(--accent);
    color: #fff;
    border: none;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    font-family: var(--font);
    white-space: nowrap;
    transition: filter 0.12s ease;
  }
  .wordbook-add-btn:hover {
    filter: brightness(1.1);
  }
  .wordbook-add-feedback {
    font-size: 11px;
    margin-top: 8px;
    min-height: 16px;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .wordbook-add-feedback.show {
    opacity: 1;
  }
  .wordbook-add-feedback.success {
    color: #2E7D32;
  }
  .wordbook-add-feedback.notfound {
    color: var(--text-tertiary);
  }
  .wordbook-add-feedback.exists {
    color: var(--accent);
  }
</style>
</head>
<body>

<div class="header">人生成功对你来说意味着什么？| 街头采访（What Does Success Mean To The French）</div>

<div class="main">

  <!-- Grammar List -->
  <div class="grammar-list">
    <div class="grammar-list-header">地道表达 · 按视频顺序</div>
    <div class="grammar-list-items" id="grammarList"></div>
  </div>

  <!-- Learning Space -->
  <div class="learning-space">
    <div class="grammar-title-row">
      <span class="grammar-title" id="grammarTitle">mettre en place</span>
      <span class="cefr-pill" id="cefrPill">B2</span>
      <span class="freq-pill" id="freqPill">12次出现</span>
    </div>

    <div class="divider"></div>

    <div class="explanation" id="explanation"></div>

    <div class="divider"></div>

    <div class="content-area">
      <div class="examples-col">
        <div class="section-label">Examples</div>
        <div id="examplesContainer"></div>
      </div>

      <div class="video-col">
        <div class="video-wrapper">
          <div id="ytPlayer"></div>
        </div>
        <div class="subtitle-panel" id="subtitlePanel"></div>
        <button class="wordbook-btn" id="wordbookBtn" onclick="toggleWordbook()">背 B1+ 单词</button>
      </div>
    </div>
  </div>

</div>

<!-- Wordbook Overlay -->
<div class="wordbook-overlay" id="wordbookOverlay" onclick="toggleWordbook()"></div>

<!-- Wordbook Panel -->
<div class="wordbook-panel" id="wordbookPanel">
  <div class="wordbook-header">
    <h2>单词本</h2>
    <button class="wordbook-close" onclick="toggleWordbook()">✕</button>
  </div>
  <div class="wordbook-body" id="wordbookBody">
    <div class="wordbook-progress" id="wordbookProgress"></div>
    <div class="flashcard" id="flashcard" onclick="revealCard()">
      <div class="front" id="cardFront"></div>
      <div class="back" id="cardBack"></div>
      <div class="example-hint" id="cardExample"></div>
      <div class="tap-hint">点击翻转</div>
    </div>
    <div class="wordbook-actions" id="wordbookActions">
      <button class="wb-btn review" onclick="markWord('dontknow')">不认识</button>
      <button class="wb-btn know" onclick="markWord('know')">认识</button>
    </div>
    <div class="wordbook-empty" id="wordbookEmpty">
      <div class="icon">🎉</div>
      <div>本视频单词已全部掌握</div>
    </div>
  </div>
  <div class="wordbook-add-area">
    <div class="wordbook-add-row">
      <input type="text" class="wordbook-add-input" id="wordAddInput"
             placeholder="输入视频中的法语单词…"
             onkeydown="if(event.key==='Enter')addCustomWord()" />
      <button class="wordbook-add-btn" onclick="addCustomWord()">添加</button>
    </div>
    <div class="wordbook-add-feedback" id="wordAddFeedback"></div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────
const grammars = [
  {
    "name": "ça veut dire quoi (X) ?",
    "level": "B1",

// ── SLANG & EXPRESSIONS ──────────────────────
// Part 2: colloquial expressions, idioms, and nuanced usage specific to this video
const slangs = [];
slangs.sort((a, b) => b.freq - a.freq);

// ── STATE ──────────────────────────────────
let currentGrammarId = grammars[0].id;
let currentGrammarIsSlang = false;  // false = grammar, true = slang
let currentPlayingTime = null;

// ── RENDER ──────────────────────────────────
function renderGrammarList() {
  const container = document.getElementById("grammarList");
  container.innerHTML = grammars.map(g => `
    <div class="grammar-item ${(!currentGrammarIsSlang && g.id === currentGrammarId) ? 'active' : ''}"
         data-id="${g.id}"
         data-type="grammar"
         onclick="selectGrammar(${g.id}, false)">
      <div class="name-row">
        <span class="name">${g.name}</span>
        <span class="cefr-badge">${g.level}</span>
      </div>
      <div class="meaning">${g.meaning}</div>
      <span class="pill">${g.freq}次</span>
    </div>
  `).join("");

  renderSlangList();
}

function renderSlangList() {
  const container = document.getElementById("slangList");
  const header = document.getElementById("slangSectionHeader");
  if (!container) return;
  if (slangs.length === 0) {
    container.innerHTML = "";
    if (header) header.style.display = "none";
    return;
  }
  if (header) header.style.display = "block";
  container.innerHTML = slangs.map(g => `
    <div class="grammar-item ${(currentGrammarIsSlang && g.id === currentGrammarId) ? 'active' : ''}"
         data-id="${g.id}"
         data-type="slang"
         onclick="selectGrammar(${g.id}, true)">
      <div class="name-row">
        <span class="name">${g.name}</span>
        <span class="cefr-badge">${g.level}</span>
      </div>
      <div class="meaning">${g.meaning}</div>
      <span class="pill">${g.freq}次</span>
    </div>
  `).join("");
}

function renderLearningSpace() {
  const source = currentGrammarIsSlang ? slangs : grammars;
  const g = source.find(x => x.id === currentGrammarId);
  if (!g) return;

  document.getElementById("grammarTitle").textContent = g.name;
  document.getElementById("cefrPill").textContent = g.level;
  document.getElementById("freqPill").textContent = g.freq + "次出现";
  document.getElementById("explanation").textContent = g.explanation;

  const examplesContainer = document.getElementById("examplesContainer");
  examplesContainer.innerHTML = g.examples.map((ex, i) => `
    <div class="example-card ${currentPlayingTime === ex.time ? 'playing' : ''}"
         id="ex-${g.id}-${i}"
         onclick="seekTo(${ex.time})">
      <div class="fr">${ex.fr}</div>
      <div class="zh">${ex.zh}</div>
      <span class="timestamp">▶ ${formatTime(ex.time)}</span>
    </div>
  `).join("");
}

function selectGrammar(id, isSlang) {
  currentGrammarId = id;
  currentGrammarIsSlang = !!isSlang;
  currentPlayingTime = null;
  renderGrammarList();
  renderSlangList();
  renderLearningSpace();
}

function seekTo(seconds) {
  currentPlayingTime = seconds;
  var seekTarget = Math.max(0, seconds - 3);
  if (ytPlayerReady && ytPlayer && ytPlayer.seekTo) {
    ytPlayer.seekTo(seekTarget, true);

  }

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m + ":" + String(sec).padStart(2, "0");
}

// ── WORDBOOK STATE ─────────────────────────
let wordbookOpen = false;
let wordbookQueue = [];     // indices in display order
let wordbookLearned = loadLearned();
let cardRevealed = false;

function toggleWordbook() {
  wordbookOpen = !wordbookOpen;
  document.getElementById("wordbookOverlay").classList.toggle("open", wordbookOpen);
  document.getElementById("wordbookPanel").classList.toggle("open", wordbookOpen);
  if (wordbookOpen) {
    // Build queue from all not-yet-learned words
    wordbookQueue = vocabList
      .map((_, i) => i)
      .filter(i => !wordbookLearned.has(i));
    cardRevealed = false;
    renderWordbook();
  }
}

function renderWordbook() {
  const total = vocabList.length;
  const learned = wordbookLearned.size;

  // Progress
  const progress = document.getElementById("wordbookProgress");
  const pct = total > 0 ? Math.round((learned / total) * 100) : 100;
  progress.innerHTML = `
    ${learned} / ${total} 已掌握
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
  `;

  // Empty state
  const emptyEl = document.getElementById("wordbookEmpty");
  const cardEl = document.getElementById("flashcard");
  const actionsEl = document.getElementById("wordbookActions");

  if (wordbookQueue.length === 0) {
    emptyEl.classList.add("show");
    cardEl.style.display = "none";
    actionsEl.style.display = "none";
    return;
  }

  emptyEl.classList.remove("show");
  cardEl.style.display = "flex";
  actionsEl.style.display = "flex";
  cardEl.classList.remove("revealed");
  cardRevealed = false;

  const word = vocabList[wordbookQueue[0]];
  document.getElementById("cardFront").textContent = word.word;
  document.getElementById("cardBack").innerHTML = `<strong>${word.zh}</strong>`;
  document.getElementById("cardExample").textContent = "« " + word.example + " »";
}

function revealCard() {
  if (cardRevealed || wordbookQueue.length === 0) return;
  cardRevealed = true;
  document.getElementById("flashcard").classList.add("revealed");
}

function markWord(action) {
  if (wordbookQueue.length === 0) return;

  const idx = wordbookQueue.shift(); // remove from front

  if (action === "know") {
    wordbookLearned.add(idx);
    saveLearned();
  } else {
    // "不认识" → push to the back of the queue
    wordbookQueue.push(idx);
  }

  // 1) Mark card as "switching" to disable transitions
  const cardEl = document.getElementById("flashcard");
  cardEl.classList.add("switching");

  // 2) Update content with new word
  const word = vocabList[wordbookQueue[0]];
  document.getElementById("cardFront").textContent = word.word;
  document.getElementById("cardBack").innerHTML = `<strong>${word.zh}</strong>`;
  document.getElementById("cardExample").textContent = "« " + word.example + " »";

  // 3) Remove revealed class — with transitions off, no flash
  cardEl.classList.remove("revealed");
  cardRevealed = false;

  // 4) Force reflow then re-enable transitions
  void cardEl.offsetHeight;
  cardEl.classList.remove("switching");

  // 5) Update progress bar
  const total = vocabList.length;
  const learned = wordbookLearned.size;
  const progress = document.getElementById("wordbookProgress");
  const pct = total > 0 ? Math.round((learned / total) * 100) : 100;
  progress.innerHTML = `
    ${learned} / ${total} 已掌握
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
  `;

  // 6) Check empty state
  const emptyEl = document.getElementById("wordbookEmpty");
  const actionsEl = document.getElementById("wordbookActions");
  if (wordbookQueue.length === 0) {
    cardEl.style.display = "none";
    actionsEl.style.display = "none";
    emptyEl.classList.add("show");
  } else {
    cardEl.style.display = "flex";
    actionsEl.style.display = "flex";
    emptyEl.classList.remove("show");
  }
}

// ── CUSTOM WORD INPUT ─────────────────────
function escapeRegExp(string) {
  return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function wordInText(word, text) {
  // Split by common punctuation and whitespace, then check exact word match
  const normalized = word.toLowerCase().replace(/[éèêë]/g, 'e').replace(/[àâä]/g, 'a').replace(/[ùûü]/g, 'u').replace(/[îï]/g, 'i').replace(/[ôö]/g, 'o').replace(/[ç]/g, 'c');
  const words = text.toLowerCase().split(/[\s,.;:!?()'"«»\-—…\/]+/).filter(Boolean);
  return words.some(w => {
    const wNorm = w.replace(/[éèêë]/g, 'e').replace(/[àâä]/g, 'a').replace(/[ùûü]/g, 'u').replace(/[îï]/g, 'i').replace(/[ôö]/g, 'o').replace(/[ç]/g, 'c');
    return wNorm === normalized || w === word.toLowerCase();
  });
}

function showWordFeedback(msg, type) {
  const el = document.getElementById("wordAddFeedback");
  el.textContent = msg;
  el.className = "wordbook-add-feedback show " + type;
  clearTimeout(el._timeout);
  el._timeout = setTimeout(function() {
    el.classList.remove("show");
  }, 4000);
}

function addCustomWord() {
  const input = document.getElementById("wordAddInput");
  const word = input.value.trim();

  if (!word) {
    showWordFeedback("请输入法语单词", "notfound");
    return;
  }

  // Check if already in vocabList
  const normInput = word.toLowerCase().replace(/[éèêë]/g, 'e').replace(/[àâä]/g, 'a').replace(/[ùûü]/g, 'u').replace(/[îï]/g, 'i').replace(/[ôö]/g, 'o').replace(/[ç]/g, 'c');
  const alreadyExists = vocabList.some(function(v) {
    var n = v.word.toLowerCase().replace(/[éèêë]/g, 'e').replace(/[àâä]/g, 'a').replace(/[ùûü]/g, 'u').replace(/[îï]/g, 'i').replace(/[ôö]/g, 'o').replace(/[ç]/g, 'c');
    return n === normInput;
  });
  if (alreadyExists) {
    showWordFeedback('\u00AB' + word + '\u00BB \u5df2\u5728\u5355\u8bcd\u672c\u4e2d', 'exists');
    return;
  }

  // Search subtitle corpus
  var matches = [];
  for (var i = 0; i < subtitleCorpus.length; i++) {
    if (wordInText(word, subtitleCorpus[i].fr)) {
      matches.push(subtitleCorpus[i]);
    }
  }

  if (matches.length === 0) {
    showWordFeedback('\u672a\u5728\u672c\u6b21\u89c6\u9891\u5b57\u5e55\u4e2d\u627e\u5230\u300c' + word + '\u300d\uff0c\u8bf7\u68c0\u67e5\u62fc\u5199\u6216\u5c1d\u8bd5\u5176\u4ed6\u5355\u8bcd', 'notfound');
    return;
  }

  // Found — use first match, prefer shorter sentences as examples
  matches.sort(function(a, b) { return a.fr.length - b.fr.length; });
  var best = matches[0];
  // For really long sentences, prefer one with the word in a concise clause
  for (var j = 0; j < matches.length; j++) {
    if (matches[j].fr.length < 60 && matches[j].fr.length > 10) {
      best = matches[j];
      break;
    }
  }

  // Build a concise definition from the sentence translation
  var def = best.zh;
  if (def.length > 50) def = def.substring(0, 48) + '\u2026';

  var entry = {
    word: word,
    zh: def,
    example: best.fr,
    fromSubtitle: true,
  };

  vocabList.push(entry);
  saveVocab();
  var newIdx = vocabList.length - 1;

  // If wordbook is open, insert at front of queue so it shows immediately
  if (wordbookOpen) {
    wordbookQueue.unshift(newIdx);
    renderWordbook();
  }

  // Clear input and show success
  input.value = '';
  var preview = best.fr.length > 40 ? best.fr.substring(0, 38) + '\u2026' : best.fr;
  showWordFeedback('\u2714 \u5df2\u4ece\u5b57\u5e55\u4e2d\u627e\u5230\u300c' + word + '\u300d\uff1a' + preview, 'success');
}

// ── SUBTITLE PANEL ──────────────────────────
let subtitleActiveTime = null;   // currently highlighted time
let subtitleInterval = null;     // polling interval ID

function renderSubtitlePanel() {
  const panel = document.getElementById("subtitlePanel");
  panel.innerHTML = subtitleCorpus.map(line => `
    <div class="subtitle-line" data-time="${line.time}"
         onclick="seekTo(${line.time})">
      <span class="sub-time">${formatTime(line.time)}</span>
      <span class="sub-fr">${line.fr}</span>
      <span class="sub-zh">${line.zh}</span>
    </div>
  `).join("");
}

function highlightSubtitle(seconds) {
  // Find the current subtitle line by time
  let bestTime = null;
  for (let i = 0; i < subtitleCorpus.length; i++) {
    if (subtitleCorpus[i].time <= seconds) {
      bestTime = subtitleCorpus[i].time;
    } else {
      break;
    }
  }
  if (bestTime === subtitleActiveTime) return;
  subtitleActiveTime = bestTime;

  // Update active class
  const lines = document.querySelectorAll(".subtitle-line");
  lines.forEach(el => {
    const t = parseInt(el.getAttribute("data-time"));
    el.classList.toggle("active", t === bestTime);
  });

  // Auto-scroll to the active line
  if (bestTime !== null) {
    const activeEl = document.querySelector(".subtitle-line.active");
    if (activeEl) {
      activeEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
  }
}

function startSubtitleTracking() {
  stopSubtitleTracking();
  subtitleInterval = setInterval(function() {
    if (ytPlayerReady && ytPlayer && ytPlayer.getCurrentTime) {
      try {
        var t = ytPlayer.getCurrentTime();
        if (typeof t === "number") highlightSubtitle(t);
      } catch (_) {}
    }
  }, 500);
}

function stopSubtitleTracking() {
  if (subtitleInterval) {
    clearInterval(subtitleInterval);
    subtitleInterval = null;
  }
}

// ── INIT ──────────────────────────────────
renderGrammarList();
renderSlangList();
renderLearningSpace();
renderSubtitlePanel();
startSubtitleTracking();
